data:
  total_batch_size: 64
  micro_batch_size: 8  # this is also val batch size
  train_dataset: gsm8k
  val_dataset: gsm8k
  max_seq_len: 1024
  balance_dp_token: false
model:
  model_path: Qwen/Qwen2-1.5B-Instruct
  enable_gradient_checkpointing: true
  fsdp_config:
    sync_module_states: false
    cpu_offload: false
    offload_params: false
    wrap_policy:
      min_num_params: 0

optim:
  lr: 1e-5
  betas: [0.9, 0.95]
  weight_decay: 0
  warmup_steps_ratio: 0.1
  clip_grad: 1.0

trainer:
  save_checkpoint_path: ./saves
  load_checkpoint_path: null
  project_name: VeRL
  experiment_name: null
  total_epochs: 3
  seed: 1
